<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pigment Value Intelligence - ROI Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #f8f9fb; color: #111827; font-size: 14px; line-height: 1.5; }
  a { color: inherit; }

  .page { max-width: 1120px; margin: 0 auto; padding: 28px 24px 48px; }

  .top-header { margin-bottom: 22px; }
  .top-header .eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .top-header .eyebrow .brand { font-size: 11px; color: #9ca3af; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }
  .top-header h1 { font-size: 22px; font-weight: 600; }
  .top-header p { font-size: 13px; color: #6b7280; margin-top: 4px; }

  .uc-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px solid #e5e7eb; align-items: center; }
  .uc-bar .uc-label { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; margin-right: 4px; align-self: center; }
  .uc-pill { padding: 5px 14px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; font-family: inherit; transition: all 0.15s; background: #f3f4f6; color: #6b7280; }
  .uc-pill.active { color: #fff; }

  .layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; align-items: start; }

  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 14px; padding: 16px 20px; margin-bottom: 14px; }
  .card:last-child { margin-bottom: 0; }
  .card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #9ca3af; margin-bottom: 14px; }
  .card-uc-head { font-size: 14px; font-weight: 600; margin-bottom: 14px; }

  .field { margin-bottom: 12px; }
  .field:last-child { margin-bottom: 0; }
  .field-label { display: flex; justify-content: space-between; font-size: 12px; color: #6b7280; margin-bottom: 5px; }
  .field-val { font-weight: 600; color: #111827; }
  input[type=range] { width: 100%; accent-color: #2d6a2d; cursor: pointer; }

  .badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 5px; font-weight: 600; letter-spacing: 0.03em; vertical-align: middle; }
  .badge-s { background: #eaf3de; color: #3B6D11; }
  .badge-e { background: #E6F1FB; color: #185FA5; }
  .badge-i { background: #FAEEDA; color: #854F0B; }

  .assump-row { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; border-bottom: 1px solid #f3f4f6; }
  .assump-row:last-child { border-bottom: none; }
  .assump-row .al { color: #6b7280; }
  .assump-row .av { font-weight: 600; }

  .driver-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 7px 0; border-bottom: 1px solid #f3f4f6; gap: 8px; }
  .driver-row:last-child { border-bottom: none; }
  .driver-name { font-size: 12px; color: #6b7280; flex: 1; line-height: 1.4; }
  .driver-vals { text-align: right; flex-shrink: 0; }
  .driver-vals .dv { font-size: 11px; font-weight: 600; color: #2d6a2d; }
  .mini-bar-track { height: 4px; background: #f3f4f6; border-radius: 2px; overflow: hidden; margin-top: 4px; width: 80px; margin-left: auto; }
  .mini-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

  .synergy-box { background: #f9fafb; border-radius: 8px; padding: 10px 12px; }
  .synergy-pt { font-size: 12px; color: #6b7280; line-height: 1.6; margin-bottom: 6px; }
  .synergy-pt:last-child { margin-bottom: 0; }

  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .kpi-cell { background: #f9fafb; border-radius: 10px; padding: 12px 14px; text-align: center; }
  .kpi-cell.span2 { grid-column: 1 / -1; }
  .kpi-label { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .kpi-value { font-size: 20px; font-weight: 600; color: #2d6a2d; line-height: 1.1; }
  .kpi-cell.span2 .kpi-value { font-size: 26px; }
  .kpi-sub { font-size: 10px; color: #9ca3af; margin-top: 3px; }

  .cap-note { margin-top: 10px; padding: 8px 10px; background: #FAEEDA; color: #633806; border-radius: 8px; font-size: 11px; line-height: 1.5; }

  .yr-table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
  .yr-table th { text-align: right; padding: 5px 6px; color: #9ca3af; font-weight: 400; border-bottom: 1px solid #f3f4f6; font-size: 11px; }
  .yr-table th:first-child { text-align: left; }
  .yr-table td { text-align: right; padding: 5px 6px; color: #111827; }
  .yr-table td:first-child { text-align: left; color: #6b7280; }
  .yr-table tr.tot td { font-weight: 600; color: #2d6a2d; border-top: 1px solid #e5e7eb; }
  .yr-table tr.inv td { color: #6b7280; }

  .chart-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 10px; }
  .chart-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #6b7280; }
  .chart-legend-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .sc-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #f3f4f6; font-size: 12px; }
  .sc-row:last-child { border-bottom: none; }
  .sc-load { flex: 1; text-align: left; background: none; border: none; cursor: pointer; font-weight: 600; color: #111827; font-size: 12px; font-family: inherit; padding: 0; }
  .sc-load:hover { color: #185FA5; }
  .sc-meta { color: #9ca3af; font-size: 11px; white-space: nowrap; }
  .sc-del { font-size: 11px; color: #9ca3af; cursor: pointer; padding: 2px 7px; border-radius: 4px; border: 1px solid #e5e7eb; background: none; font-family: inherit; }
  .sc-del:hover { background: #fef2f2; color: #dc2626; border-color: transparent; }
  .sc-empty { font-size: 12px; color: #9ca3af; font-style: italic; margin-bottom: 10px; }

  .save-row { display: flex; gap: 6px; margin-top: 10px; }
  .save-row input { flex: 1; font-size: 12px; padding: 6px 10px; border-radius: 8px; border: 1px solid #e5e7eb; font-family: inherit; outline: none; }
  .save-row input:focus { border-color: #2d6a2d; }
  .btn { font-family: inherit; cursor: pointer; border-radius: 8px; font-size: 12px; padding: 6px 12px; border: 1px solid #e5e7eb; background: #f9fafb; color: #111827; font-weight: 500; }
  .btn:hover { background: #f3f4f6; }
  .btn-green { background: #2d6a2d; color: #fff; border-color: transparent; font-weight: 600; }
  .btn-green:hover { background: #245824; }
  .btn-save-trigger { width: 100%; margin-top: 10px; font-size: 12px; padding: 8px; }
  .btn-generate { width: 100%; font-size: 13px; padding: 11px; border-radius: 10px; background: #2d6a2d; color: #fff; border: none; cursor: pointer; font-family: inherit; font-weight: 600; letter-spacing: 0.01em; margin-bottom: 6px; }
  .btn-generate:hover { background: #245824; }
  .generate-note { font-size: 11px; color: #9ca3af; text-align: center; }

  .legend-bar { margin-top: 24px; padding-top: 16px; border-top: 1px solid #e5e7eb; display: flex; gap: 16px; flex-wrap: wrap; }
  .legend-item { font-size: 11px; }
  .legend-pill { padding: 1px 7px; border-radius: 10px; font-weight: 600; margin-right: 4px; }

  .no-uc { text-align: center; padding: 3rem 1rem; color: #9ca3af; font-size: 13px; }

  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="top-header">
    <div class="eyebrow">
      <span class="brand">Pigment &mdash; Value Intelligence</span>
    </div>
    <h1>ROI Calculator</h1>
    <p>Select use cases, set inputs, and model 3-year value. All benchmarks from Pigment's documented framework.</p>
  </div>

  <div class="uc-bar">
    <span class="uc-label">Use cases</span>
    <button class="uc-pill active" data-uc="fpa"   style="background:#2d6a2d;color:#fff">FP&amp;A</button>
    <button class="uc-pill"        data-uc="spm"   >SPM</button>
    <button class="uc-pill"        data-uc="wfp"   >Workforce planning</button>
    <button class="uc-pill"        data-uc="scm"   >Supply chain</button>
    <button class="uc-pill"        data-uc="consol">Financial consolidations</button>
  </div>

  <div class="layout">
    <div id="left-col"></div>
    <div id="right-col"></div>
  </div>

  <div class="legend-bar">
    <span class="legend-item" style="color:#3B6D11"><span class="legend-pill" style="background:#eaf3de">SOURCED</span>from public filings or verified research</span>
    <span class="legend-item" style="color:#185FA5"><span class="legend-pill" style="background:#E6F1FB">ESTIMATED</span>derived from industry benchmarks</span>
    <span class="legend-item" style="color:#854F0B"><span class="legend-pill" style="background:#FAEEDA">INTERNAL</span>from Pigment product benchmarks</span>
  </div>
</div>

<script>
const RISK = 0.85, RAMP = 0.5;

const PALETTE = { fpa:"#2d6a2d", spm:"#185FA5", wfp:"#854F0B", scm:"#993C1D", consol:"#534AB7", ai:"#5F5E5A" };

const fmtM = v => {
  const a = Math.abs(v), s = v < 0 ? "-" : "";
  if (a >= 1e9) return s + "$" + (Math.round(a/1e8)/10) + "B";
  if (a >= 1e6) return s + "$" + (Math.round(a/1e5)/10) + "M";
  if (a >= 1e3) return s + "$" + (Math.round(a/100)/10) + "K";
  return s + "$" + Math.round(a).toLocaleString();
};
const fmtDisp = (v, fmt) => {
  if (fmt === "M") return fmtM(v);
  if (fmt === "%") return Math.round(v * 100) + "%";
  return Math.round(v).toLocaleString();
};
const badge = src => {
  const map = { s:["SOURCED","badge-s"], e:["ESTIMATED","badge-e"], i:["INTERNAL","badge-i"] };
  if (!src || !map[src]) return "";
  return `<span class="badge ${map[src][1]}">${map[src][0]}</span>`;
};

const SH = {
  revenue:   { id:"revenue",   label:"Annual revenue",        min:100e6, max:20e9,  step:50e6,  def:1e9,   fmt:"M" },
  headcount: { id:"headcount", label:"Total headcount",       min:200,   max:100000,step:200,   def:3000,  fmt:"#" },
  invest_y1: { id:"invest_y1", label:"Platform investment Y1",min:100e3, max:8e6,   step:50e3,  def:600e3, fmt:"M" },
  invest_y2: { id:"invest_y2", label:"Platform investment Y2+",min:100e3,max:5e6,   step:50e3,  def:400e3, fmt:"M" },
};

const UCS = {
  fpa: {
    label:"FP&A",
    fields:[
      {...SH.revenue},
      {id:"sga",       label:"Annual SG&A",            min:20e6, max:5e9,  step:20e6,  def:300e6, fmt:"M", src:"e", tip:"Aberdeen Group"},
      {id:"capex",     label:"Annual CapEx",            min:5e6,  max:3e9,  step:10e6,  def:150e6, fmt:"M", src:"s", tip:"McKinsey"},
      {...SH.headcount},
      {id:"toolspend", label:"Legacy tool spend / yr",  min:0,    max:30e6, step:500e3, def:12e6,  fmt:"M", src:"e", tip:"Gartner / APQC"},
      {...SH.invest_y1}, {...SH.invest_y2},
    ],
    calc(s) {
      const finFTE = Math.round(s.headcount*0.02), hr = 130000/2080;
      const d1 = s.sga*0.05*RISK, d2 = s.capex*0.15*0.40*RISK, d3 = finFTE*40*12*hr*0.60*RISK;
      return { drivers:[
        {n:"SG&A forecast accuracy",       src:"s", y1:d1*RAMP, yn:d1},
        {n:"CapEx portfolio optimization", src:"s", y1:d2*RAMP, yn:d2},
        {n:"Planning process efficiency",  src:"s", y1:d3*RAMP, yn:d3},
        {n:"Legacy system elimination",    src:"e", y1:s.toolspend*0.5, yn:s.toolspend},
      ], inv:[s.invest_y1, s.invest_y2, s.invest_y2] };
    }
  },
  spm: {
    label:"SPM",
    fields:[
      {...SH.revenue},
      {id:"gm",       label:"Gross margin %",                  min:0.10, max:0.90, step:0.01, def:0.60, fmt:"%", src:"s", tip:"HBR"},
      {id:"gtm_hc",   label:"GTM / quota-bearing headcount",   min:25,   max:5000, step:25,   def:200,  fmt:"#", src:"s", tip:"Gartner"},
      {id:"planners", label:"Revenue planning FTEs",           min:1,    max:50,   step:1,    def:5,    fmt:"#", src:"e"},
      {...SH.invest_y1}, {...SH.invest_y2},
    ],
    calc(s) {
      const r10=0.10;
      const d1=s.revenue*0.003*s.gm*r10, d2=s.revenue*0.001*s.gm*r10;
      const d3=s.planners*200000*0.01, d4=s.gtm_hc*150000*0.40*0.03*r10, d5=s.planners*130000*0.03;
      return { drivers:[
        {n:"Territory optimization",       src:"s", y1:d1*RAMP, yn:d1},
        {n:"Forecast accuracy",            src:"s", y1:d2*RAMP, yn:d2},
        {n:"Sales leader time recovery",   src:"e", y1:d3*RAMP, yn:d3},
        {n:"Commission governance",        src:"s", y1:d4*RAMP, yn:d4},
        {n:"RevOps planning efficiency",   src:"s", y1:d5*RAMP, yn:d5},
      ], inv:[s.invest_y1, s.invest_y2, s.invest_y2] };
    }
  },
  wfp: {
    label:"Workforce planning",
    fields:[
      {id:"labor_spend",   label:"Total annual labor spend",   min:50e6, max:10e9, step:25e6,  def:500e6, fmt:"M", src:"i", tip:"Pigment benchmark"},
      {id:"annual_hires",  label:"Annual hires",               min:50,   max:20000,step:50,    def:500,   fmt:"#", src:"s", tip:"Merritt Research"},
      {id:"unplanned_pct", label:"Unplanned hire %",           min:0.05, max:0.40, step:0.01,  def:0.15,  fmt:"%", src:"e"},
      {...SH.headcount},
      {id:"toolspend_wfp", label:"Legacy tool spend / yr",     min:0,    max:20e6, step:250e3, def:8e6,   fmt:"M", src:"e", tip:"Gartner / APQC"},
      {...SH.invest_y1}, {...SH.invest_y2},
    ],
    calc(s) {
      const finFTE=Math.round(s.headcount*0.02), hr=130000/2080;
      const d1=s.labor_spend*0.003*RISK, d2=s.annual_hires*s.unplanned_pct*0.05*18000*RISK;
      const d3=finFTE*40*12*hr*0.60*RISK;
      return { drivers:[
        {n:"Labor spend optimization",     src:"i", y1:d1*RAMP, yn:d1},
        {n:"Recruiting cost reduction",    src:"s", y1:d2*RAMP, yn:d2},
        {n:"Planning process efficiency",  src:"s", y1:d3*RAMP, yn:d3},
        {n:"Legacy system elimination",    src:"e", y1:s.toolspend_wfp*0.5, yn:s.toolspend_wfp},
      ], inv:[s.invest_y1, s.invest_y2, s.invest_y2] };
    }
  },
  scm: {
    label:"Supply chain",
    fields:[
      {...SH.revenue},
      {id:"logistics",    label:"Annual logistics spend",      min:5e6,  max:2e9,  step:5e6,   def:200e6, fmt:"M", src:"s", tip:"APQC"},
      {id:"inventory",    label:"Inventory value (on hand)",   min:10e6, max:5e9,  step:25e6,  def:500e6, fmt:"M", src:"s", tip:"IBF/APQC"},
      {...SH.headcount},
      {id:"toolspend_scm",label:"Legacy tool spend / yr",      min:0,    max:20e6, step:250e3, def:10e6,  fmt:"M", src:"e", tip:"Gartner"},
      {...SH.invest_y1}, {...SH.invest_y2},
    ],
    calc(s) {
      const finFTE=Math.round(s.headcount*0.02), hr=130000/2080;
      const d1=s.revenue*0.01*0.50*RISK, d2=s.logistics*0.07*RISK;
      const d3=s.inventory*0.20*0.10*RISK, d4=finFTE*40*12*hr*0.60*RISK;
      return { drivers:[
        {n:"Stock-out minimization",       src:"s", y1:d1*RAMP, yn:d1},
        {n:"Expedited shipping reduction", src:"s", y1:d2*RAMP, yn:d2},
        {n:"Inventory carrying cost",      src:"s", y1:d3*RAMP, yn:d3},
        {n:"Planning process efficiency",  src:"s", y1:d4*RAMP, yn:d4},
        {n:"Legacy system elimination",    src:"e", y1:s.toolspend_scm*0.5, yn:s.toolspend_scm},
      ], inv:[s.invest_y1, s.invest_y2, s.invest_y2] };
    }
  },
  consol: {
    label:"Financial consolidations",
    fields:[
      {...SH.revenue},
      {...SH.headcount},
      {id:"toolspend_consol", label:"Legacy consolidation tool spend / yr", min:0, max:30e6, step:500e3, def:10e6, fmt:"M", src:"e", tip:"Gartner EPM pricing"},
      {...SH.invest_y1}, {...SH.invest_y2},
    ],
    calc(s) {
      const finFTE=Math.round(s.headcount*0.02), closeFTE=Math.round(finFTE*0.30);
      const d1=closeFTE*(130000/250)*2*12*RISK, d2=s.revenue*0.0015*0.70*RISK;
      const d3=finFTE*130000*0.18*0.25*RISK;
      return { drivers:[
        {n:"Close cycle compression",      src:"s", y1:d1*RAMP, yn:d1},
        {n:"Intercompany elimination",     src:"s", y1:d2*RAMP, yn:d2},
        {n:"Audit and reporting efficiency",src:"s",y1:d3*RAMP, yn:d3},
        {n:"Legacy system elimination",    src:"e", y1:s.toolspend_consol*0.5, yn:s.toolspend_consol},
      ], inv:[s.invest_y1, s.invest_y2, s.invest_y2] };
    }
  },
};

const AI_AGENTS = [
  {n:"Modeler Agent", src:"i", y1:65000, yn:130000},
  {n:"Analyst Agent", src:"i", y1:65000, yn:130000},
];

const SYNERGY = {
  "consol+fpa": "Actuals-to-plan with zero integration lag - consolidated actuals feed planning immediately.",
  "consol+wfp": "Workforce costs flow from WFP into consolidated financials without re-entry.",
  "fpa+spm":    "Revenue assumptions flow from SPM territory plans into FP&A automatically.",
  "fpa+wfp":    "Headcount-to-P&L - workforce plan drives compensation expense in the financial model.",
  "fpa+scm":    "Inventory and logistics assumptions surface directly in working capital and cash flow.",
};

let activeUCs = ["fpa"];
let state = {};
let scenarios = [];
let chartInst = null;
let savingOpen = false;

Object.keys(UCS).forEach(uc => UCS[uc].fields.forEach(f => { if (!(f.id in state)) state[f.id] = f.def; }));

function loadScenarios() {
  try { scenarios = JSON.parse(localStorage.getItem("pigment_roi_scenarios") || "[]"); } catch { scenarios = []; }
}

function saveScenarios() {
  try { localStorage.setItem("pigment_roi_scenarios", JSON.stringify(scenarios)); } catch {}
}

function compute() {
  const seen = new Set();
  let y1=0, y2=0, y3=0, allDrivers=[], maxInv=[0,0,0];
  activeUCs.forEach(uc => {
    const r = UCS[uc].calc(state);
    r.drivers.forEach(d => {
      if (!seen.has(d.n)) { seen.add(d.n); allDrivers.push({...d, uc}); y1+=d.y1; y2+=d.yn; y3+=d.yn; }
    });
    maxInv = [Math.max(maxInv[0],r.inv[0]), Math.max(maxInv[1],r.inv[1]), Math.max(maxInv[2],r.inv[2])];
  });
  AI_AGENTS.forEach(d => { allDrivers.push({...d, uc:"ai"}); y1+=d.y1; y2+=d.yn; y3+=d.yn; });
  const inv=maxInv, total3=y1+y2+y3, totalInv=inv[0]+inv[1]+inv[2], net=total3-totalInv;
  const rawROI=totalInv>0?total3/totalInv:0, capped=rawROI>99;
  const roiDisp=capped?"99x+":Math.round(rawROI)+"x";
  const monthly=y1/12, pbMo=monthly>0?Math.ceil(inv[0]/monthly):null;
  const pbDisp=pbMo?(pbMo>24?"24+ mo.":pbMo+" mo."):"N/A";
  return {y1,y2,y3,total3,inv,totalInv,net,rawROI,capped,roiDisp,pbDisp,allDrivers};
}

function buildSynPts() {
  const pts = [], has = uc => activeUCs.includes(uc);
  if (has("consol")&&has("fpa"))  pts.push(SYNERGY["consol+fpa"]);
  if (has("consol")&&has("wfp"))  pts.push(SYNERGY["consol+wfp"]);
  if (has("fpa")&&has("spm"))     pts.push(SYNERGY["fpa+spm"]);
  if (has("fpa")&&has("wfp"))     pts.push(SYNERGY["fpa+wfp"]);
  if (has("fpa")&&has("scm"))     pts.push(SYNERGY["fpa+scm"]);
  pts.push("Single Modeler Agent and Analyst Agent serve all use cases - no duplication of AI value.");
  return pts;
}

function renderChart(r) {
  const canvas = document.getElementById("roi-chart");
  if (!canvas) return;
  if (chartInst) { chartInst.destroy(); chartInst = null; }
  const datasets = activeUCs.map(uc => {
    const res = UCS[uc].calc(state);
    const t = res.drivers.reduce((a,d)=>({y1:a.y1+d.y1,yn:a.yn+d.yn}),{y1:0,yn:0});
    return { label:UCS[uc].label, data:[Math.round(t.y1),Math.round(t.yn),Math.round(t.yn)], backgroundColor:PALETTE[uc], borderRadius:3, borderSkipped:false };
  });
  datasets.push({ label:"AI Agents", data:[130000,260000,260000], backgroundColor:PALETTE.ai, borderRadius:3, borderSkipped:false });
  chartInst = new Chart(canvas, {
    type:"bar",
    data:{ labels:["Year 1","Year 2","Year 3"], datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>c.dataset.label+": "+fmtM(c.raw)}} },
      scales:{
        x:{ stacked:true, grid:{display:false}, ticks:{font:{size:11,family:"DM Sans, sans-serif"}} },
        y:{ stacked:true, grid:{color:"rgba(0,0,0,0.05)"}, ticks:{font:{size:11,family:"DM Sans, sans-serif"}, callback:v=>fmtM(v)} }
      }
    }
  });
}

function renderAll() {
  renderLeft();
  renderRight();
}

function renderLeft() {
  const col = document.getElementById("left-col");
  const r = compute();
  const isMulti = activeUCs.length > 1;
  const renderedShared = new Set();

  let html = "";

  if (activeUCs.length === 0) {
    html = '<div class="no-uc">Select at least one use case above.</div>';
    col.innerHTML = html;
    return;
  }

  activeUCs.forEach(uc => {
    const cfg = UCS[uc];
    html += `<div class="card" style="border-left:3px solid ${PALETTE[uc]}">`;
    html += `<div class="card-uc-head" style="color:${PALETTE[uc]}">${cfg.label}</div>`;
    cfg.fields.forEach(f => {
      if (isMulti && ["invest_y1","invest_y2"].includes(f.id) && renderedShared.has(f.id)) return;
      renderedShared.add(f.id);
      const v = state[f.id] !== undefined ? state[f.id] : f.def;
      html += `<div class="field">
        <div class="field-label">
          <span>${f.label}${badge(f.src)}</span>
          <span class="field-val" id="fv_${f.id}">${fmtDisp(v, f.fmt)}</span>
        </div>
        <input type="range" min="${f.min}" max="${f.max}" step="${f.step}" value="${v}"
          data-id="${f.id}" data-fmt="${f.fmt}" oninput="handleSlider(this)">
      </div>`;
    });
    html += `</div>`;
  });

  html += `<div class="card">
    <div class="card-title">Fixed model assumptions</div>
    <div class="assump-row"><span class="al">Risk adjustment (Forrester TEI)${badge("s")}</span><span class="av">15%</span></div>
    <div class="assump-row"><span class="al">Year 1 ramp (6-month implementation)${badge("s")}</span><span class="av">50%</span></div>
    <div class="assump-row"><span class="al">Finance FTEs${badge("e")}</span><span class="av">2% of headcount</span></div>
    <div class="assump-row"><span class="al">Modeler Agent baseline${badge("i")}</span><span class="av">1 FTE / $130K</span></div>
    <div class="assump-row"><span class="al">Analyst Agent baseline${badge("i")}</span><span class="av">1 FTE / $130K</span></div>
  </div>`;

  const maxYn = Math.max(...r.allDrivers.map(d => d.yn), 1);
  html += `<div class="card"><div class="card-title">Value drivers (Y1 / run rate)</div>`;
  r.allDrivers.forEach(d => {
    const pct = Math.round(d.yn / maxYn * 100);
    const col = d.uc === "ai" ? PALETTE.ai : (PALETTE[d.uc] || "#2d6a2d");
    html += `<div class="driver-row">
      <span class="driver-name">${d.n}${badge(d.src)}</span>
      <span class="driver-vals">
        <div class="dv">${fmtM(d.y1)} / ${fmtM(d.yn)}</div>
        <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%;background:${col}"></div></div>
      </span>
    </div>`;
  });
  html += `</div>`;

  if (isMulti) {
    const pts = buildSynPts();
    html += `<div class="card"><div class="card-title">Platform synergy</div><div class="synergy-box">`;
    pts.forEach(pt => { html += `<div class="synergy-pt">${pt}</div>`; });
    html += `</div></div>`;
  }

  html += `<div class="card"><div class="card-title">Scenarios</div>`;
  if (scenarios.length === 0) html += `<div class="sc-empty">No saved scenarios yet.</div>`;
  scenarios.forEach(sc => {
    html += `<div class="sc-row">
      <button class="sc-load" onclick="loadScenario(${sc.id})">${sc.name}</button>
      <span class="sc-meta">${sc.ucs.join(", ")} &middot; ${sc.ts}</span>
      <button class="sc-del" onclick="deleteScenario(${sc.id})">remove</button>
    </div>`;
  });
  if (savingOpen) {
    html += `<div class="save-row">
      <input type="text" id="sc-name-input" placeholder="Scenario name..." onkeydown="if(event.key==='Enter') confirmSave()">
      <button class="btn btn-green" onclick="confirmSave()">Save</button>
      <button class="btn" onclick="cancelSave()">Cancel</button>
    </div>`;
  } else {
    html += `<button class="btn btn-save-trigger" onclick="openSave()">Save current scenario</button>`;
  }
  html += `</div>`;

  html += `<button class="btn-generate" onclick="handleGenerate()">Generate business case document &#8599;</button>
  <p class="generate-note">Opens Claude with your inputs pre-loaded to produce a formatted .docx deliverable.</p>`;

  col.innerHTML = html;

  if (savingOpen) {
    const inp = document.getElementById("sc-name-input");
    if (inp) inp.focus();
  }
}

function renderRight() {
  const col = document.getElementById("right-col");
  const r = compute();

  let html = `<div class="card">
    <div class="kpi-grid">
      <div class="kpi-cell span2">
        <div class="kpi-label">3-year net benefit</div>
        <div class="kpi-value">${fmtM(r.net)}</div>
        <div class="kpi-sub">after all investment</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-label">ROI (3-year)</div>
        <div class="kpi-value">${r.roiDisp}</div>
        <div class="kpi-sub">return on investment</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-label">Year 1 benefit</div>
        <div class="kpi-value">${fmtM(r.y1)}</div>
        <div class="kpi-sub">ramp-adjusted</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-label">Payback</div>
        <div class="kpi-value">${r.pbDisp}</div>
        <div class="kpi-sub">on Y1 investment</div>
      </div>
      <div class="kpi-cell">
        <div class="kpi-label">Full run rate</div>
        <div class="kpi-value">${fmtM(r.y2)}</div>
        <div class="kpi-sub">from Year 2</div>
      </div>
    </div>
    ${r.capped ? `<div class="cap-note">Calculated ROI exceeds 99x. Capped at 99x+ for conservative positioning. Validate investment assumptions in discovery.</div>` : ""}
  </div>`;

  html += `<div class="card"><div class="card-title">Year-by-year benefit</div>
    <div class="chart-legend" id="chart-legend"></div>
    <div style="position:relative;height:180px"><canvas id="roi-chart" role="img" aria-label="Stacked bar chart showing Year 1, Year 2, Year 3 benefit by use case"></canvas></div>
  </div>`;

  html += `<div class="card"><div class="card-title">3-year summary</div>
    <table class="yr-table">
      <thead><tr><th></th><th>Y1</th><th>Y2</th><th>Y3</th><th>Total</th></tr></thead>
      <tbody>
        <tr>
          <td>Gross benefit</td>
          <td>${fmtM(r.y1)}</td><td>${fmtM(r.y2)}</td><td>${fmtM(r.y3)}</td><td>${fmtM(r.total3)}</td>
        </tr>
        <tr class="inv">
          <td>Investment</td>
          <td>(${fmtM(r.inv[0])})</td><td>(${fmtM(r.inv[1])})</td><td>(${fmtM(r.inv[2])})</td><td>(${fmtM(r.totalInv)})</td>
        </tr>
        <tr class="tot">
          <td>Net benefit</td>
          <td>${fmtM(r.y1-r.inv[0])}</td><td>${fmtM(r.y2-r.inv[1])}</td><td>${fmtM(r.y3-r.inv[2])}</td><td>${fmtM(r.net)}</td>
        </tr>
      </tbody>
    </table>
  </div>`;

  col.innerHTML = html;

  const legendEl = document.getElementById("chart-legend");
  if (legendEl) {
    let lhtml = "";
    activeUCs.forEach(uc => {
      lhtml += `<span class="chart-legend-item"><span class="chart-legend-swatch" style="background:${PALETTE[uc]}"></span>${UCS[uc].label}</span>`;
    });
    lhtml += `<span class="chart-legend-item"><span class="chart-legend-swatch" style="background:${PALETTE.ai}"></span>AI Agents</span>`;
    legendEl.innerHTML = lhtml;
  }

  setTimeout(() => renderChart(r), 0);
}

function handleSlider(inp) {
  const id = inp.dataset.id, fmt = inp.dataset.fmt;
  state[id] = parseFloat(inp.value);
  const el = document.getElementById("fv_" + id);
  if (el) el.textContent = fmtDisp(state[id], fmt);
  renderRight();
  const maxYn = (() => {
    const r = compute();
    return Math.max(...r.allDrivers.map(d => d.yn), 1);
  })();
  const r = compute();
  r.allDrivers.forEach(d => {
    const pct = Math.round(d.yn / maxYn * 100);
  });
  renderLeft();
}

function toggleUC(uc) {
  if (activeUCs.includes(uc)) {
    if (activeUCs.length === 1) return;
    activeUCs = activeUCs.filter(u => u !== uc);
  } else {
    activeUCs.push(uc);
  }
  document.querySelectorAll(".uc-pill").forEach(btn => {
    const u = btn.dataset.uc, on = activeUCs.includes(u);
    btn.classList.toggle("active", on);
    btn.style.background = on ? PALETTE[u] : "#f3f4f6";
    btn.style.color = on ? "#fff" : "#6b7280";
  });
  renderAll();
}

function openSave() { savingOpen = true; renderLeft(); }
function cancelSave() { savingOpen = false; renderLeft(); }
function confirmSave() {
  const inp = document.getElementById("sc-name-input");
  const name = inp ? inp.value.trim() : "";
  if (!name) return;
  scenarios.unshift({ id:Date.now(), name, ucs:[...activeUCs], state:{...state}, ts:new Date().toLocaleDateString() });
  if (scenarios.length > 10) scenarios = scenarios.slice(0, 10);
  saveScenarios();
  savingOpen = false;
  renderLeft();
}

function loadScenario(id) {
  const snap = scenarios.find(s => s.id === id);
  if (!snap) return;
  activeUCs = [...snap.ucs];
  state = {...state, ...snap.state};
  document.querySelectorAll(".uc-pill").forEach(btn => {
    const u = btn.dataset.uc, on = activeUCs.includes(u);
    btn.classList.toggle("active", on);
    btn.style.background = on ? PALETTE[u] : "#f3f4f6";
    btn.style.color = on ? "#fff" : "#6b7280";
  });
  renderAll();
}

function deleteScenario(id) {
  scenarios = scenarios.filter(s => s.id !== id);
  saveScenarios();
  renderLeft();
}

function handleGenerate() {
  const r = compute();
  const ucList = activeUCs.map(uc => UCS[uc].label).join(", ");
  const inputSummary = Object.entries(state).map(([k,v]) => `${k}: ${fmtM(v)}`).join(", ");
  const prompt = `Build a full Pigment business case document for the following use cases: ${ucList}. Key inputs: ${inputSummary}. Computed results: 3-year net benefit ${fmtM(r.net)}, ROI ${r.roiDisp}, Year 1 benefit ${fmtM(r.y1)}, full run rate from Y2 ${fmtM(r.y2)}, payback ${r.pbDisp}. Please produce the .docx and .html deliverables per the standard Pigment business case format.`;
  window.open("https://claude.ai/new?q=" + encodeURIComponent(prompt), "_blank");
}

document.querySelectorAll(".uc-pill").forEach(btn => {
  btn.addEventListener("click", () => toggleUC(btn.dataset.uc));
});

loadScenarios();
renderAll();
</script>
</body>
</html>
